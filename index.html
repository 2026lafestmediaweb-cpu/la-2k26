<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA 2K26.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      height: 100vh;
      background: url('nataraja2.jpeg') no-repeat center center/cover;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .nakuldinakar {
      background: rgba(0, 0, 0, 0.4);
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    @font-face {
  font-family: 'Panchang';
  src:url("Panchang-Regular.woff") format("woff");
  font-style: normal;
    }
   

    .main h2 {
  font-family: 'Panchang';
  font-size: 48px;
  margin-bottom: 20px;
  letter-spacing: 3px;

 
  background-image: linear-gradient(
      to right,
      rgba(7, 9, 84, 1) 0%,
      rgba(255, 255, 255, 0.6) 40%,
      rgba(7, 9, 84, 1) 80%
      
    ),
    linear-gradient(to bottom, #6f7cff, #040F7B, #02074a);

  -webkit-background-clip: text;
  background-clip: text;

  -webkit-text-fill-color: transparent;
  color: transparent;

 
  text-shadow: 
    0 2px 4px rgba(0, 0, 0, 0.4),
    0 0 6px rgba(255, 255, 255, 0.2);
}


    
    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="nakuldinakar">
    <div class="main">
      <h2 class="">COMING SOON.</h2>
    </div>

    <footer>
      © 2026 JESSE '27. ALL RIGHTS RESERVED.
    </footer>

  </div>
</body>
</html>
